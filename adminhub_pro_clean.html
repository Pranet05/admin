<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary);min-height:100vh}
.shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);padding:1.25rem 1rem;display:flex;flex-direction:column;gap:6px}
.logo{font-size:15px;font-weight:500;padding:0 0.5rem 1.25rem;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:0.5rem;color:var(--color-text-primary)}
.logo span{font-size:12px;color:var(--color-text-secondary);display:block;margin-top:2px;font-weight:400}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--border-radius-md);font-size:13.5px;color:var(--color-text-secondary);cursor:pointer;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.nav-item.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.nav-icon{width:16px;height:16px;opacity:0.7}
.main{padding:1.75rem 2rem;display:flex;flex-direction:column;gap:1.5rem;overflow:auto}
.topbar{display:flex;justify-content:space-between;align-items:center}
.page-title{font-size:18px;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--color-background-info);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--color-text-info)}
.btn{padding:7px 14px;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary)}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:var(--color-text-primary);color:var(--color-background-primary);border-color:transparent}
.btn-primary:hover{opacity:0.85}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem 1.1rem}
.metric-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:6px}
.metric-val{font-size:24px;font-weight:500}
.metric-delta{font-size:12px;margin-top:4px;color:var(--color-text-secondary)}
.content-grid{display:grid;grid-template-columns:minmax(0,2fr) minmax(0,1fr);gap:1.25rem;align-items:start}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.card-title{font-size:14px;font-weight:500}
.search-wrap{position:relative;margin-bottom:1rem}
.search-wrap input{padding-left:32px;font-size:13px}
.search-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;opacity:0.4}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.05em;padding:0 12px 10px;text-align:left;border-bottom:0.5px solid var(--color-border-tertiary)}
td{padding:11px 12px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-background-secondary)}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;background:var(--color-background-secondary);color:var(--color-text-secondary);margin-right:4px}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px}
.dot-green{background:#22c55e}
.dot-gray{background:var(--color-text-secondary);opacity:0.4}
.row-actions{display:flex;gap:4px;opacity:0}
tr:hover .row-actions{opacity:1}
.icon-btn{padding:5px 7px;border-radius:6px;border:none;background:none;cursor:pointer;color:var(--color-text-secondary);font-size:12px}
.icon-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:5px;display:block}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.activity-item{display:flex;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary);align-items:flex-start}
.activity-item:last-child{border-bottom:none}
.act-dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0}
.act-text{font-size:13px;color:var(--color-text-primary);line-height:1.4}
.act-time{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.initials{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.badge-active{background:#dcfce7;color:#166534}
.badge-inactive{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 1rem;color:var(--color-text-secondary);font-size:13px;gap:8px}
.empty-icon{width:32px;height:32px;opacity:0.25}
</style>

<h2 class="sr-only">AdminHub Pro — user management dashboard</h2>

<div class="shell">
  <aside class="sidebar">
    <div class="logo">AdminHub Pro <span>workspace</span></div>
    <button class="nav-item active">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
      Overview
    </button>
    <button class="nav-item">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
      Users
    </button>
    <button class="nav-item">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M4 8h8M6 12h4"/></svg>
      Activity
    </button>
    <button class="nav-item">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
      History
    </button>
    <button class="nav-item" style="margin-top:auto">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4"/></svg>
      Settings
    </button>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="page-title">Users</div>
      <div class="topbar-right">
        <button class="btn">Export</button>
        <button class="btn btn-primary">+ Add user</button>
        <div class="avatar">AH</div>
      </div>
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Total users</div>
        <div class="metric-val" id="m-total">—</div>
        <div class="metric-delta">Loading…</div>
      </div>
      <div class="metric">
        <div class="metric-label">Active</div>
        <div class="metric-val" id="m-active">—</div>
        <div class="metric-delta" id="m-active-rate">Loading…</div>
      </div>
      <div class="metric">
        <div class="metric-label">New this week</div>
        <div class="metric-val" id="m-new">—</div>
        <div class="metric-delta">From your DB</div>
      </div>
      <div class="metric">
        <div class="metric-label">Churned</div>
        <div class="metric-val" id="m-churned">—</div>
        <div class="metric-delta">From your DB</div>
      </div>
    </div>

    <div class="content-grid">
      <div class="card">
        <div class="card-header">
          <span class="card-title">All users</span>
          <div style="display:flex;gap:8px">
            <button class="btn" style="font-size:12px;padding:5px 10px">Filter</button>
            <button class="btn" style="font-size:12px;padding:5px 10px">Sort</button>
          </div>
        </div>
        <div class="search-wrap">
          <svg class="search-ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5l3 3"/></svg>
          <input type="text" placeholder="Search by name or email…" id="search-input">
        </div>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Hobbies</th>
              <th>Age</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="user-table">
            <tr><td colspan="5">
              <div class="empty-state">
                <svg class="empty-icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="16" cy="10" r="6"/><path d="M4 28c0-6.6 5.4-12 12-12s12 5.4 12 12"/></svg>
                No users yet — add one to get started
              </div>
            </td></tr>
          </tbody>
        </table>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:1rem;padding-top:1rem;border-top:0.5px solid var(--color-border-tertiary)">
          <span style="font-size:12px;color:var(--color-text-secondary)" id="table-count">0 users</span>
          <div style="display:flex;gap:6px">
            <button class="btn" style="font-size:12px;padding:5px 10px">Previous</button>
            <button class="btn" style="font-size:12px;padding:5px 10px">Next</button>
          </div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:1.25rem">
        <div class="card">
          <div class="card-header"><span class="card-title" id="form-title">Add user</span></div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Name</label>
              <input type="text" id="name" placeholder="Full name" style="font-size:13px">
            </div>
            <div class="form-group">
              <label class="form-label">Age</label>
              <input type="number" id="age" placeholder="Age" style="font-size:13px">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="email" placeholder="email@example.com" style="font-size:13px">
          </div>
          <div class="form-group">
            <label class="form-label">Hobbies</label>
            <input type="text" id="hobbies" placeholder="Comma separated" style="font-size:13px">
          </div>
          <div class="form-group">
            <label class="form-label">Bio</label>
            <textarea id="bio" placeholder="Short bio…" rows="3" style="font-size:13px;resize:vertical"></textarea>
          </div>
          <button class="btn btn-primary" id="submit-btn" style="width:100%;justify-content:center">Save user</button>
          <button class="btn" id="cancel-btn" style="width:100%;justify-content:center;margin-top:8px;display:none">Cancel edit</button>
        </div>

        <div class="card">
          <div class="card-header"><span class="card-title">Recent activity</span></div>
          <div id="activity-feed">
            <div class="empty-state" style="padding:1.5rem 0">
              No activity yet
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const API = 'http://localhost:3000/api/users';
let users = [];
let editingId = null;

const tableBody = document.getElementById('user-table');
const activityFeed = document.getElementById('activity-feed');
const searchInput = document.getElementById('search-input');
const submitBtn = document.getElementById('submit-btn');
const cancelBtn = document.getElementById('cancel-btn');
const formTitle = document.getElementById('form-title');
const tableCount = document.getElementById('table-count');

const COLORS = [
  {bg:'#ede9fe',color:'#5b21b6'},{bg:'#fef3c7',color:'#92400e'},
  {bg:'#e0f2fe',color:'#075985'},{bg:'#fce7f3',color:'#9d174d'},
  {bg:'#dcfce7',color:'#166534'},{bg:'#fff7ed',color:'#9a3412'}
];

function initials(name){return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function colorFor(name){const i=name.charCodeAt(0)%COLORS.length;return COLORS[i];}

function renderTable(data){
  if(!data.length){
    tableBody.innerHTML=`<tr><td colspan="5"><div class="empty-state"><svg class="empty-icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="16" cy="10" r="6"/><path d="M4 28c0-6.6 5.4-12 12-12s12 5.4 12 12"/></svg>No users yet — add one to get started</div></td></tr>`;
    tableCount.textContent='0 users';
    return;
  }
  tableCount.textContent=`${data.length} user${data.length!==1?'s':''}`;
  tableBody.innerHTML=data.map(u=>{
    const c=colorFor(u.name||'?');
    const ini=initials(u.name||'?');
    const hobbies=(u.hobbies||[]).filter(h=>h.trim()).map(h=>`<span class="tag">${h.trim()}</span>`).join('')||'—';
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px">
        <div class="initials" style="background:${c.bg};color:${c.color}">${ini}</div>
        <div><div style="font-weight:500;font-size:13px">${u.name}</div></div>
      </div></td>
      <td style="color:var(--color-text-secondary)">${u.email}</td>
      <td>${hobbies}</td>
      <td style="color:var(--color-text-secondary)">${u.age||'—'}</td>
      <td><div class="row-actions">
        <button class="icon-btn" onclick="editUser('${u._id}')">Edit</button>
        <button class="icon-btn" style="color:var(--color-text-danger)" onclick="deleteUser('${u._id}')">Del</button>
      </div></td>
    </tr>`;
  }).join('');
}

function updateMetrics(){
  document.getElementById('m-total').textContent=users.length;
  document.getElementById('m-active').textContent='—';
  document.getElementById('m-active-rate').textContent='Add status to your schema';
  document.getElementById('m-new').textContent='—';
  document.getElementById('m-churned').textContent='—';
}

function addActivity(text, type='add'){
  const dot=type==='add'?'#22c55e':type==='update'?'#3b82f6':'#ef4444';
  const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if(activityFeed.querySelector('.empty-state')) activityFeed.innerHTML='';
  const el=document.createElement('div');
  el.className='activity-item';
  el.innerHTML=`<div class="act-dot" style="background:${dot}"></div><div><div class="act-text">${text}</div><div class="act-time">${time}</div></div>`;
  activityFeed.prepend(el);
}

async function load(){
  try{
    const res=await fetch(API);
    const data=await res.json();
    users=data.users||data;
    renderTable(users);
    updateMetrics();
  }catch(e){
    tableBody.innerHTML=`<tr><td colspan="5"><div class="empty-state">Could not connect to backend</div></td></tr>`;
  }
}

searchInput.oninput=()=>{
  const v=searchInput.value.toLowerCase();
  renderTable(users.filter(u=>u.name.toLowerCase().includes(v)||u.email.toLowerCase().includes(v)));
};

submitBtn.onclick=async()=>{
  const userData={
    name:document.getElementById('name').value,
    email:document.getElementById('email').value,
    age:document.getElementById('age').value,
    hobbies:document.getElementById('hobbies').value.split(',').map(h=>h.trim()),
    bio:document.getElementById('bio').value
  };
  if(!userData.name||!userData.email) return;
  try{
    if(editingId){
      await fetch(`${API}/${editingId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(userData)});
      addActivity(`Updated ${userData.name}`,'update');
      resetForm();
    } else {
      await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(userData)});
      addActivity(`Added ${userData.name}`,'add');
      clearFields();
    }
    load();
  }catch(e){addActivity('Error saving user','delete');}
};

function editUser(id){
  const u=users.find(x=>x._id===id);
  if(!u) return;
  document.getElementById('name').value=u.name||'';
  document.getElementById('email').value=u.email||'';
  document.getElementById('age').value=u.age||'';
  document.getElementById('hobbies').value=(u.hobbies||[]).join(', ');
  document.getElementById('bio').value=u.bio||'';
  editingId=id;
  formTitle.textContent='Edit user';
  submitBtn.textContent='Update user';
  cancelBtn.style.display='block';
}

async function deleteUser(id){
  const u=users.find(x=>x._id===id);
  if(!confirm('Delete this user?')) return;
  try{
    await fetch(`${API}/${id}`,{method:'DELETE'});
    addActivity(`Deleted ${u?.name||'user'}`,'delete');
    if(editingId===id) resetForm();
    load();
  }catch(e){}
}

cancelBtn.onclick=resetForm;

function resetForm(){
  editingId=null;
  clearFields();
  formTitle.textContent='Add user';
  submitBtn.textContent='Save user';
  cancelBtn.style.display='none';
}

function clearFields(){
  ['name','email','age','hobbies','bio'].forEach(id=>document.getElementById(id).value='');
}

load();
</script>
