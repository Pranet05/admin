<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AdminHub Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg: linear-gradient(135deg, #eef2ff, #f8fafc);
    --card: rgba(255,255,255,0.7);
    --text: #0f172a;
    --muted: #64748b;
    --green: #10b981;
    --blue: #3b82f6;
    --danger: #ef4444;
}

.dark {
    --bg: #0f172a;
    --card: rgba(30,41,59,0.6);
    --text: #f1f5f9;
    --muted: #94a3b8;
}

* {
    box-sizing: border-box;
    transition: all 0.2s ease;
}

body {
    margin: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}

/* GREEN ANIMATED BACKGROUND */

body::before {
    content: "";
    position: fixed;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, #34d399, transparent);
    top: -120px;
    right: -120px;
    opacity: 0.25;
    filter: blur(40px);
    animation: greenFloat 8s ease-in-out infinite;
}

body {
    background: linear-gradient(135deg, #ecfdf5, #f0fdf4, #ecfdf5);
    background-size: 200% 200%;
    animation: bgMove 10s ease infinite;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

body::after {
    content: "";
    position: fixed;
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, #10b981, transparent);
    bottom: -100px;
    left: -100px;
    opacity: 0.25;
    filter: blur(50px);
    animation: greenFloat 10s ease-in-out infinite reverse;
}

@keyframes greenFloat {
    0%, 100% {
        transform: translate(0, 0) scale(1);
    }
    50% {
        transform: translate(30px, 30px) scale(1.1);
    }
}

/* HEADER */
header {
    backdrop-filter: blur(10px);
    background: var(--card);
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-weight: 800;
    font-size: 1.3rem;
}

.toggle {
    cursor: pointer;
    padding: 8px 14px;
    border-radius: 10px;
    background: var(--green);
    color: white;
}

/* LAYOUT */
.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
    min-height: calc(100vh - 100px);
}

/* STATS */
.stats {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.stat {
    flex: 1;
    background: var(--card);
    padding: 20px;
    border-radius: 16px;
    backdrop-filter: blur(12px);
}

/* PANELS */
.grid {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: stretch; /* Prevents stretching */

}

.card {
    background: var(--card);
    padding: 25px;
    border-radius: 18px;
    backdrop-filter: blur(12px);
    flex: 1;
    min-width: 300px; /* Helps layout on medium screens */
}

.card[style*="flex: 2"] {
    flex: 2.5;
}

/* OPTIONAL: Make form slightly smaller */
.card[style*="flex: 1"] {
    flex: 1;
}

/* FORM */
input, textarea {
    width: 100%;
    margin-bottom: 12px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    background: transparent;
    color: var(--text);
}

.dark input, .dark textarea {
    border-color: #334155;
}

button {
    padding: 12px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
}

.primary {
    background: linear-gradient(135deg,#10b981,#34d399);
    color: white;
    width: 100%;
}

.action-btn {
    padding: 6px 10px;
    border-radius: 8px;
    background: transparent;
    font-size: 1.1rem;
}

.action-btn:hover {
    background: rgba(0,0,0,0.05);
}
.dark .action-btn:hover {
    background: rgba(255,255,255,0.1);
}

/* TABLE */
table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 10px;
}

tr {
    background: var(--card);
}

td, th {
    padding: 12px;
    text-align: left;
}

.badge {
    background: #d1fae5;
    color: #065f46;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    margin-right: 4px;
    display: inline-block;
}

/* DARK MODE FIX */
.dark .badge {
    background: rgba(16, 185, 129, 0.15);
    color: #34d399;
    border: 1px solid rgba(16, 185, 129, 0.3);
}

#activity p {
    padding: 10px;
    background: rgba(255,255,255,0.5);
    border-radius: 10px;
    margin-bottom: 8px;
    font-size: 0.9rem;
}

.dark #activity p {
    background: rgba(255,255,255,0.05);
}

/* TOAST */
.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #0f172a;
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    opacity: 0;
    transform: translateY(20px);
    z-index: 1000;
}

.dark .toast {
    background: #f8fafc;
    color: #0f172a;
}

footer {
    margin-top: 40px;
    padding: 20px;
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}
/* PAGE LOAD ANIMATION */
body {
    animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* CARD HOVER EFFECT */
.card, .stat {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover, .stat:hover {
    transform: translateY(-6px) scale(1.01);
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
}

.dark .card:hover, 
.dark .stat:hover {
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

/* BUTTON RIPPLE EFFECT */
button {
    position: relative;
    overflow: hidden;
}

button::after {
    content: "";
    position: absolute;
    width: 100px;
    height: 100px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    transform: scale(0);
    opacity: 0;
    pointer-events: none;
}

button:active::after {
    transform: scale(3);
    opacity: 1;
    transition: transform 0.4s, opacity 0.6s;
}

/* TABLE ROW ANIMATION */
tbody tr {
    animation: slideUp 0.4s ease forwards;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* INPUT FOCUS GLOW */
input:focus, textarea:focus {
    outline: none;
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
}

/* TOAST IMPROVED */
.toast.show {
    animation: toastSlide 0.4s ease forwards;
}

@keyframes toastSlide {
    from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

/* FLOATING BACKGROUND BUBBLES */
body::before {
    content: "";
    position: fixed;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, #3b82f6, transparent);
    top: -100px;
    right: -100px;
    opacity: 0.2;
    animation: float 6s ease-in-out infinite;
}

body::after {
    content: "";
    position: fixed;
    width: 250px;
    height: 250px;
    background: radial-gradient(circle, #10b981, transparent);
    bottom: -80px;
    left: -80px;
    opacity: 0.2;
    animation: float 8s ease-in-out infinite reverse;
}

@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(20px); }
}

/* MOBILE */
@media(max-width:768px){
    .grid { flex-direction: column; }
    .card { width: 100%; }
}
</style>
</head>

<body>

<header>
    <div class="logo">🚀 AdminHub Pro</div>
    <div class="toggle" onclick="toggleDark()">🌙 Toggle</div>
</header>

<div class="container">

    <div class="stats">
        <div class="stat">Total Users: <b id="count">0</b></div>
    </div>

   <div class="grid">

    <div class="card" style="flex: 1;">
        <h3 id="form-title">Add User</h3>
        <form id="form">
            <input id="name" placeholder="Name" required>
            <input id="email" type="email" placeholder="Email" required>
            <input id="age" type="number" placeholder="Age">
            <input id="hobbies" placeholder="Hobbies (comma separated)">
            <textarea id="bio" placeholder="Bio"></textarea>
            <button type="submit" id="submit-btn" class="primary">Save</button>
            <button type="button" id="cancel-btn" style="display:none; margin-top:10px; width:100%;">Cancel Edit</button>
        </form>
    </div>

    <!-- USERS TABLE TAKES FULL WIDTH -->
    <div class="card" style="flex: 2;">
        <h3>Users</h3>
        <input id="search" placeholder="Search by name...">
        
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Age</th>
                        <th>Hobbies</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="table"></tbody>
            </table>
        </div>
    </div>

</div>

<!-- MOVED BELOW -->
<div class="card" style="margin-top:20px;">
    <h3>Recent Activity</h3>
    <div id="activity">
        <p>No recent activity yet 🚀</p>
    </div>
</div>
</div>

<div class="toast" id="toast"></div>

<footer>
    Built by AdminHub • 2026
</footer>

<script>
    const API = 'http://localhost:3000/api/users';
    let users = [];
    let editingId = null; // Tracks if we are editing an existing user

    // DOM Elements
    const form = document.getElementById('form');
    const tableBody = document.getElementById('table');
    const searchInput = document.getElementById('search');
    const countEl = document.getElementById('count');
    const submitBtn = document.getElementById('submit-btn');
    const cancelBtn = document.getElementById('cancel-btn');
    const formTitle = document.getElementById('form-title');

    /* TOAST */
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    /* DARK MODE */
    function toggleDark() {
        document.body.classList.toggle('dark');
    }

    /* FETCH USERS */
    async function load() {
        try {
            const res = await fetch(API);
            const data = await res.json();
            users = data.users || data;
            render(users);
            countEl.innerText = users.length;
        } catch (error) {
            console.error("Error fetching users:", error);
            showToast("Failed to load users ❌");
        }
    }

    /* RENDER TABLE */
    function render(data) {
        tableBody.innerHTML = '';

        if(data.length === 0){
            tableBody.innerHTML = `<tr><td colspan="5">No users found 🚀</td></tr>`;
            return;
        }

        data.forEach(u => {
            const hobbiesHtml = u.hobbies?.filter(h => h.trim() !== "").map(h => `<span class="badge">${h.trim()}</span>`).join('') || '-';
            
            tableBody.innerHTML += `
            <tr>
                <td>${u.name}</td>
                <td>${u.email}</td>
                <td>${u.age || '-'}</td>
                <td>${hobbiesHtml}</td>
                <td>
                    <button class="action-btn" onclick="editUser('${u._id}')" title="Edit">✏️</button>
                    <button class="action-btn" onclick="del('${u._id}')" title="Delete">❌</button>
                </td>
            </tr>`;
        });
    }

    /* SEARCH */
    searchInput.oninput = () => {
        const v = searchInput.value.toLowerCase();
        render(users.filter(u => u.name.toLowerCase().includes(v)));
    }

    /* ADD / UPDATE FORM SUBMIT */
    form.onsubmit = async (e) => {
        e.preventDefault();

        const userData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            age: document.getElementById('age').value,
            hobbies: document.getElementById('hobbies').value.split(',').map(h => h.trim()),
            bio: document.getElementById('bio').value
        };

        try {
            if (editingId) {
                // UPDATE Existing User
                await fetch(`${API}/${editingId}`, {
                    method: 'PUT', // or 'PATCH' depending on your backend
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                showToast("User updated ✏️");
                addActivity(`Updated details for ${userData.name}`);
                resetFormState();
            } else {
                // ADD New User
                await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                showToast("User added 🚀");
                addActivity(`Added new user: ${userData.name}`);
                form.reset();
            }
            load();
        } catch (error) {
            console.error("Error saving user:", error);
            showToast("Error saving user ❌");
        }
    }

    /* EDIT BUTTON CLICKED */
    function editUser(id) {
        const user = users.find(u => u._id === id);
        if (!user) return;

        // Populate Form
        document.getElementById('name').value = user.name || '';
        document.getElementById('email').value = user.email || '';
        document.getElementById('age').value = user.age || '';
        document.getElementById('hobbies').value = user.hobbies ? user.hobbies.join(', ') : '';
        document.getElementById('bio').value = user.bio || '';

        // Change Form State
        editingId = id;
        formTitle.innerText = "Edit User";
        submitBtn.innerText = "Update User";
        cancelBtn.style.display = "block";
        
        // Scroll to form (helpful on mobile)
        document.getElementById('form').scrollIntoView({ behavior: 'smooth' });
    }

    /* CANCEL EDIT */
    cancelBtn.onclick = () => {
        resetFormState();
    };

    function resetFormState() {
        editingId = null;
        form.reset();
        formTitle.innerText = "Add User";
        submitBtn.innerText = "Save";
        cancelBtn.style.display = "none";
    }

    /* DELETE */
    async function del(id) {
        if(!confirm("Are you sure you want to delete this user?")) return;

        const user = users.find(u => u._id === id);
        
        try {
            await fetch(`${API}/${id}`, { method: 'DELETE' });
            showToast("Deleted ❌");
            if (user) addActivity(`Deleted user: ${user.name}`);
            
            // If we delete the user we are currently editing, reset the form
            if (editingId === id) resetFormState();
            
            load();
        } catch (error) {
            console.error("Error deleting user:", error);
            showToast("Failed to delete ❌");
        }
    }

    /* ACTIVITY LOG */
    function addActivity(text) {
        const act = document.getElementById('activity');
        
        if(act.innerHTML.includes("No recent activity yet")) {
            act.innerHTML = '';
        }

        const item = document.createElement('p');
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        item.innerText = `[${time}] ${text}`;

        act.prepend(item);
    }

    // Initial Load
    load();
</script>

</body>
</html>
